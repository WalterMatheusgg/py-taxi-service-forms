{% extends "base.html" %}

{% block content %}
<div class="container">
  <h1>Delete Car</h1>
  <p>Are you sure you want to delete "{{ object }}" ?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
    <a href="{% url 'taxi:car-list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
